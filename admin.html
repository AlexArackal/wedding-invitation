<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Wedding Invitation</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>💎 Admin Panel</h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-tab="overview">📊 Overview</button>
                <button class="nav-item" data-tab="rsvp">✅ RSVP Management</button>
                <button class="nav-item" data-tab="blessings">✨ Blessings</button>
                <button class="nav-item" data-tab="config">⚙️ Settings</button>
            </nav>
            <a href="index.html" class="back-link">← Back to Invitation</a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Overview Tab -->
            <section id="overview" class="tab-content active">
                <h2>Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Wedding RSVP</div>
                        <div class="stat-value" id="weddingRsvpTotal">0</div>
                        <div class="stat-sublabel">Guests Confirmed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Reception RSVP</div>
                        <div class="stat-value" id="receptionRsvpTotal">0</div>
                        <div class="stat-sublabel">Guests Confirmed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Blessings</div>
                        <div class="stat-value" id="totalBlessings">0</div>
                        <div class="stat-sublabel">Messages Received</div>
                    </div>
                </div>
            </section>

            <!-- RSVP Management Tab -->
            <section id="rsvp" class="tab-content">
                <h2>RSVP Management</h2>
                
                <div class="rsvp-management">
                    <!-- Wedding RSVP -->
                    <div class="rsvp-section">
                        <h3>💒 Wedding Ceremony RSVP</h3>
                        <div class="rsvp-controls">
                            <label>Total Guests:</label>
                            <input type="number" id="weddingRsvpInput" value="0" min="0">
                            <button id="updateWeddingRsvpBtn" class="btn-primary">Update</button>
                        </div>
                        <div class="rsvp-info">
                            <p>Current: <strong id="weddingRsvpDisplay">0</strong> guests</p>
                            <button id="resetWeddingRsvpBtn" class="btn-danger">Reset to 0</button>
                        </div>
                    </div>

                    <!-- Reception RSVP -->
                    <div class="rsvp-section">
                        <h3>🎉 Reception RSVP</h3>
                        <div class="rsvp-controls">
                            <label>Total Guests:</label>
                            <input type="number" id="receptionRsvpInput" value="0" min="0">
                            <button id="updateReceptionRsvpBtn" class="btn-primary">Update</button>
                        </div>
                        <div class="rsvp-info">
                            <p>Current: <strong id="receptionRsvpDisplay">0</strong> guests</p>
                            <button id="resetReceptionRsvpBtn" class="btn-danger">Reset to 0</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Blessings Tab -->
            <section id="blessings" class="tab-content">
                <h2>Manage Blessings</h2>
                <div class="blessings-management">
                    <div class="blessings-list" id="adminBlessingsList">
                        <!-- Blessings will be loaded here -->
                    </div>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="config" class="tab-content">
                <h2>Settings & Configuration</h2>
                <div class="config-form">
                    <div class="form-group">
                        <label>Bride's Name</label>
                        <input type="text" id="brideName" placeholder="Enter bride's name">
                    </div>
                    <div class="form-group">
                        <label>Groom's Name</label>
                        <input type="text" id="groomName" placeholder="Enter groom's name">
                    </div>
                    <div class="form-group">
                        <label>Surname</label>
                        <input type="text" id="coupleSurname" placeholder="Enter surname">
                    </div>
                    <div class="form-group">
                        <label>Wedding Date</label>
                        <input type="date" id="ceremonyDate">
                    </div>
                    <div class="form-group">
                        <label>Wedding Time</label>
                        <input type="time" id="ceremonyTime">
                    </div>
                    <div class="form-group">
                        <label>Wedding Venue</label>
                        <input type="text" id="ceremonyVenue" placeholder="Venue name">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" id="whatsappNumber" placeholder="+91 9999999999">
                    </div>
                    <button id="saveConfigBtn" class="btn-primary">Save Configuration</button>
                </div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
